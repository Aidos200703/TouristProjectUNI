{% extends 'services/crud/base_manage.html' %}

{% block manage_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">{{ title }}</h4>
                <a href="{% url back_url %}" class="btn btn-outline-custom btn-sm">
                    <i class="fas fa-arrow-left me-1"></i> Back
                </a>
            </div>

            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        {{ field.label }}
                        {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                    {% endif %}
                    {% if field.help_text %}
                    <div class="text-muted small mt-1">{{ field.help_text }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-primary-custom px-4">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                    <a href="{% url back_url %}" class="btn btn-outline-custom px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
