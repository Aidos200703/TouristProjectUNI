
<div id="erd" style="padding: 1rem 0;"></div>
<style>
#erd svg { width: 100% !important; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a40' : '#e6f1fb',
    primaryBorderColor: dark ? '#534AB7' : '#185FA5',
    secondaryColor: dark ? '#1a2a1a' : '#eaf3de',
    tertiaryColor: dark ? '#2a1a1a' : '#faece7',
  },
});

const diagram = `erDiagram
  COUNTRY {
    int id PK
    string name
    string code
    string continent
    text description
  }
  DESTINATION {
    int id PK
    string name
    int country_id FK
    text description
    string image_url
    decimal rating
    decimal price_per_day
    bool is_featured
  }
  GUIDE {
    int id PK
    string full_name
    string photo_url
    text bio
    string languages
    int years_experience
    string specialization
    decimal rating
    bool is_available
  }
  TOURPACKAGE {
    int id PK
    string title
    int destination_id FK
    string category
    text description
    int duration_days
    decimal price
    int max_group_size
    bool includes_hotel
    bool includes_flight
    bool includes_meals
    bool is_available
    datetime created_at
  }
  TOURPACKAGE_GUIDES {
    int tourpackage_id FK
    int guide_id FK
  }
  CUSTOMER {
    int id PK
    string first_name
    string last_name
    string email
    string phone
    int country_id FK
    datetime created_at
  }
  BOOKING {
    int id PK
    int customer_id FK
    int tourpackage_id FK
    int guide_id FK
    date travel_date
    int number_of_people
    text special_requests
    string status
    decimal total_price
    datetime created_at
  }
  REVIEW {
    int id PK
    int tourpackage_id FK
    int customer_id FK
    int rating
    text comment
    datetime created_at
  }

  COUNTRY ||--o{ DESTINATION : "has"
  COUNTRY ||--o{ CUSTOMER : "from"
  DESTINATION ||--o{ TOURPACKAGE : "includes"
  TOURPACKAGE ||--o{ TOURPACKAGE_GUIDES : "assigned"
  GUIDE ||--o{ TOURPACKAGE_GUIDES : "leads"
  CUSTOMER ||--o{ BOOKING : "makes"
  TOURPACKAGE ||--o{ BOOKING : "booked in"
  GUIDE ||--o{ BOOKING : "assigned to"
  TOURPACKAGE ||--o{ REVIEW : "receives"
  CUSTOMER ||--o{ REVIEW : "writes"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
